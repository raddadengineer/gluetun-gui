services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - path: ./gluetun.env
        required: false        # File is created automatically by the GUI on first save
    ports:
      - "8888:8888/tcp"       # HTTP proxy
      - "8388:8388/tcp"       # Shadowsocks
      - "8388:8388/udp"       # Shadowsocks

  gluetun-gui:
    image: raddadengineer/gluetun-gui:latest
    container_name: gluetun-gui
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # MANDATORY: Required for the GUI to monitor and control the Gluetun container
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent GUI settings (password, PIA credentials, proxy toggles, etc.)
      - ./gui-settings.env:/usr/src/app/.env
      # REQUIRED for PIA WireGuard key generation and Gluetun config management
      - ./gluetun-config:/config
      - ./gluetun.env:/gluetun.env
    depends_on:
      - gluetun
